{% extends 'base.html' %}
{% block title %}Reports{% endblock %}
{% block content %}
<section class="page-panel">
    <div class="section-heading">
        <div>
            <p class="eyebrow">Reports Center</p>
            <h1>Department-wise reporting snapshots</h1>
        </div>
    </div>
    <div class="dashboard-grid">
        {% for dept in payload.departments %}
        <article class="glass-panel">
            <h2>{{ dept.name }}</h2>
            <p>Approved: {{ dept.approved }}</p>
            <p>Pending: {{ dept.pending }}</p>
            <a class="button secondary" href="#">Download Summary</a>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
